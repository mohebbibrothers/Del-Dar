upstream deldar_backend {
    server unix:/run/deldar/gunicorn.sock fail_timeout=0;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ipcphotos.com www.ipcphotos.com project.malcomx.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ipcphotos.com www.ipcphotos.com project.malcomx.ir;

    ssl_certificate /etc/letsencrypt/live/ipcphotos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ipcphotos.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 20M;

    # Django Admin
    location /admin/ {
        proxy_pass http://deldar_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static & Media
    location /static/ {
        alias /opt/deldar/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /opt/deldar/media/;
        expires 7d;
        access_log off;
    }

    # API Backend — catch-all for /api/
    # Rewrites /api/auth|onboarding|dashboard -> /api/v1/...
    # Passes /api/docs, /api/schema, /api/v1/* directly
    location /api/ {
        rewrite ^/api/(auth|onboarding|dashboard)/(.*)$ /api/v1/$1/$2 break;
        proxy_pass http://deldar_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Frontend React SPA
    location / {
        root /var/www/deldar-frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (frontend)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        root /var/www/deldar-frontend;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
